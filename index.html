<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trust or Doubt Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- LOADING -->
    <section id="scene-loading" class="scene">
      <h2>Trust or Doubt</h2>
      <p>Loading...</p>
    </section>

    <!-- START MENU -->
    <section id="scene-start" class="scene" style="display: none">
      <button id="btn-start-game">Start</button>
    </section>

    <!-- CASE BOOK -->
    <section id="scene-book" class="scene" style="display: none">
      <h2 id="case-title"></h2>

      <div>
        <h3>Deskripsi</h3>
        <ul id="case-description"></ul>
      </div>

      <div>
        <h3>Kronologi</h3>
        <ul id="chronology"></ul>
      </div>

      <div>
        <h3>Tersangka</h3>
        <p id="suspect-name"></p>
      </div>

      <button id="startInterrogation">Mulai Investigasi</button>
    </section>

    <!-- GAMEPLAY -->
    <section id="scene-interrogation" class="scene" style="display: none">
      <p id="emotion"></p>
      <p id="dialogText"></p>
      <div id="options"></div>
      <div id="actions" class="actions"></div>
    </section>

    <!-- ENDING -->
    <section id="scene-ending" class="scene" style="display: none">
      <h2>Thank You for Playing!</h2>
      <p id="ending-credits"></p>
      <button id="btn-back-to-start">Back to Start</button>
    </section>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
